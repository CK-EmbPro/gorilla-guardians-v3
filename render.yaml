services:
  - type: web
    name: gorilla-guardians-api
    runtime: node
    region: oregon
    plan: free

    # Build: install deps from monorepo root, then build just the api-server
    buildCommand: "pnpm install --ignore-scripts && pnpm --filter @workspace/api-server run build"

    # Start: run the compiled output
    startCommand: "pnpm --filter @workspace/api-server run start"

    healthCheckPath: /api/healthz

    envVars:
      - key: ENABLE_EXPERIMENTAL_COREPACK
        value: "1"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      # Set the following in the Render dashboard → Environment tab (never commit secrets):
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
